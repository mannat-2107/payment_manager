# Render Blueprint for automated, free Laravel deployment using Docker
services:
  - type: web
    name: payment-manager
    runtime: docker
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: payment-manager-db
          property: connectionString
      - key: DB_URL
        fromDatabase:
          name: payment-manager-db
          property: connectionString
      - key: LOG_CHANNEL
        value: stderr

databases:
  - name: payment-manager-db
    plan: free
    databaseName: payment_manager
